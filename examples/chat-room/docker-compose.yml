version: '3'

services:
  consul:
    image: consul:latest
    ports:
      - "8500:8500"
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  gate:
    build:
      context: ./gate
      dockerfile: Dockerfile
    ports:
      - "8800:8800"
    environment:
      - CONSUL_ADDR=consul:8500
      - REDIS_ADDR=redis:6379
    depends_on:
      - consul
      - redis

  node:
    build:
      context: ./node
      dockerfile: Dockerfile
    environment:
      - CONSUL_ADDR=consul:8500
      - REDIS_ADDR=redis:6379
    depends_on:
      - consul
      - redis
